[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "director_hub"
version = "0.1.0"
description = "Agentic AI brain for the Forever engine RPG"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "pydantic>=2.5",
    "pyyaml>=6.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.5",
    "mypy>=1.10",
]
anthropic = [
    "anthropic>=0.40",
]
chroma = [
    "chromadb>=0.5",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["director_hub*"]
exclude = ["tests*", "_archive*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "_archive",
    ".venv",
    "build",
    "dist",
    "director_hub/bridge/_generated_schemas.py",  # auto-generated, do not lint
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort (import sorting)
    "B",   # flake8-bugbear (likely bugs)
    "UP",  # pyupgrade (modern syntax)
]
ignore = [
    "E501",  # line too long — already enforced by line-length but allow long URLs/strings
    "B008",  # function call in default arg — needed for FastAPI Depends-style patterns
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401"]  # tests intentionally import-and-not-use sometimes

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
warn_return_any = true
warn_unused_configs = true
exclude = [
    "_archive",
    ".venv",
    "build",
    "dist",
]

