repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-check
        name: pytest (fast subset)
        entry: python -m pytest tests/ -x -q --tb=line
        language: system
        pass_filenames: false
        always_run: true
