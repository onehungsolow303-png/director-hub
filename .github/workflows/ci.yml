name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unit:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v

  smoke:
    name: live HTTP smoke (with live Anthropic if secret set)
    runs-on: ubuntu-latest
    needs: unit
    # Job-level env so step-level `if:` expressions can check whether the
    # secret is set. Step-level env: inheriting from secrets is opaque to if:.
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev + anthropic extras
        run: pip install -e ".[dev,anthropic]"

      - name: Boot uvicorn in background
        run: |
          nohup uvicorn director_hub.bridge.server:app --port 7802 > /tmp/dh.log 2>&1 &
          sleep 3

      - name: /health probe
        run: curl -fsS http://127.0.0.1:7802/health

      - name: Run golden eval suite
        run: python -m director_hub.evals.runner --url http://127.0.0.1:7802

      - name: Live LLM round-trip (informational, only when ANTHROPIC_API_KEY is set)
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        # Best-effort: log whether the live LLM is reachable but do NOT fail
        # CI on a stale credential. The repo currently uses a Claude Code
        # OAuth token as the secret, which rotates every few hours via
        # Claude Code's refresh flow. CI has no way to refresh, so the
        # secret is reliably stale by the time CI runs. The unit tests in
        # test_anthropic_tool_loop.py mock the SDK and exercise the same
        # dispatch logic without depending on a live token, so the agentic
        # loop is verified there. This step exists only as an early-warning
        # signal: if/when a real billing API key is used as the secret,
        # this step starts going green and provides "live LLM still works"
        # confirmation on every push.
        continue-on-error: true
        run: |
          response=$(curl -fsS -X POST http://127.0.0.1:7802/interpret_action \
            -H "Content-Type: application/json" \
            -d '{"schema_version":"1.0.0","session_id":"ci-live","actor_id":"player","player_input":"I draw my sword","actor_stats":{"hp":20,"max_hp":20}}')
          echo "$response"
          if echo "$response" | python -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d['deterministic_fallback'] is False else 1)"; then
            echo "OK: live LLM responded"
          else
            echo "INFO: live LLM unreachable (likely stale OAuth token); fell back to stub"
          fi

      - name: Show server log on failure
        if: failure()
        run: cat /tmp/dh.log
