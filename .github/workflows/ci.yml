name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unit:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v

  smoke:
    name: live HTTP smoke
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: Boot uvicorn in background
        run: |
          nohup uvicorn director_hub.bridge.server:app --port 7802 > /tmp/dh.log 2>&1 &
          sleep 3

      - name: /health probe
        run: curl -fsS http://127.0.0.1:7802/health

      - name: Run golden eval suite
        run: python -m director_hub.evals.runner --url http://127.0.0.1:7802

      - name: Show server log on failure
        if: failure()
        run: cat /tmp/dh.log
