# Director Hub LLM provider configuration.
#
# The ReasoningEngine reads `active` and looks up the matching entry in
# `providers`. If the active provider can't be initialized (missing SDK,
# missing API key, network error during construction), the engine logs a
# warning and falls back to the deterministic stub. The bridge always
# returns a well-formed DecisionPayload either way.
#
# Setting active to anthropic in production: install the SDK and export
# your key:
#
#     pip install -e ".[anthropic]"
#     export ANTHROPIC_API_KEY=sk-ant-...
#
# Then change `active` below from `stub` to `anthropic` and restart uvicorn.

providers:
  - name: stub
    type: deterministic
    notes: "Default. Returns a canned DecisionPayload for any input. Always works, no credentials needed."

  - name: anthropic
    model: claude-haiku-4-5
    max_tokens: 1024
    notes: "Anthropic Claude. Requires `pip install -e .[anthropic]` and ANTHROPIC_API_KEY env var. Haiku chosen for low-latency in-game responses + higher rate limits than Sonnet."

active: anthropic
